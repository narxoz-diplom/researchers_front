name: Deploy Web

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to deploy (defaults to current commit sha)'
        required: false

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push Web image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      owner_lower: ${{ steps.meta.outputs.owner_lower }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: meta
        run: |
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          SHA="${{ github.sha }}"
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "${TAG}" ]]; then TAG="sha-${SHA::12}"; fi
          {
            echo "image_tag=${TAG}"
            echo "owner_lower=${OWNER_LOWER}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ steps.meta.outputs.owner_lower }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/researchers-web:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ steps.meta.outputs.owner_lower }}/researchers-web:latest

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    environment:
      name: production
      url: https://${{ vars.PROD_DOMAIN }}
    steps:
      - name: Validate production environment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          missing=0
          for name in VPS_HOST VPS_USER VPS_SSH_KEY GHCR_PAT; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} is empty. Add it in Settings → Environments → production → Environment secrets."
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then exit 1; fi

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail
            cd /home/${{ secrets.VPS_USER }}/researchers
            chmod +x deploy/scripts/*.sh
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USER || github.actor }}" --password-stdin
            CI_IMAGE_OWNER="${{ needs.build-and-push.outputs.owner_lower }}" \
              bash deploy/scripts/deploy.sh \
              "${API_IMAGE_TAG:-latest}" \
              "${{ needs.build-and-push.outputs.image_tag }}"
